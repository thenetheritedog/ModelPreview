<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Model Viewer</title>
        <link rel="stylesheet" type="text/css" href="/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
    </head>
    <body>
        <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

        <div id="main-content" class="fill-screen">
            <div id="content-left">
                <div id="side-menu">
                    <div id="side-menu-inner">
                        <div id="side-menu-tabs"></div>
                        <div id="model-selection-area">
                            <div class="model-selection-card" data-model-src="/models/PlayerDesignAttempt2.glb">
                                <img src="/thumbnails/KnightModelPreview.png">
                                <p>Player Design<br>Attempt 2</p>
                            </div>
                            <div class="model-selection-card" data-model-src="/models/Sword.glb">
                                <img src="/thumbnails/Render.png">
                                <p>Sword</p>
                            </div>
                            <div class="model-selection-card">
                                <img src="https://picsum.photos/100/100">
                                <p>Model 3</p>
                            </div>
                            <div class="model-selection-card">
                                <img src="https://picsum.photos/100/100">
                                <p>Model 4</p>
                            </div>
                        </div>
                        <div id="menu-footer">
                            <h1>Models</h1>
                        </div>
                    </div>
                </div>
            </div>
            <div id="content-right">
                <model-viewer id="model-preview"
                    src=""
                    ar camera-controls touch-action="pan-y"></model-viewer>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
