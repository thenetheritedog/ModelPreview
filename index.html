<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Model Viewer</title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

        <div id="main-content" class="fill-screen">

            <aside id="content-left">
                <div id="side-menu">
                    <div id="brand-bar">
                        <span id="brand-name">MODEL VIEWER</span>
                        <div id="brand-tag">ASSET LIBRARY</div>
                    </div>

                    <div id="filter-bar">
                        <div id="filter-chips">
                            <button class="chip active" data-filter="all">All</button>
                            <button class="chip" data-filter="characters">Characters</button>
                            <button class="chip" data-filter="props">Props</button>
                        </div>
                    </div>

                    <div id="model-selection-area">

                        <div class="model-selection-card" data-model-src="/models/PlayerDesignAttempt2.glb" data-model-download="/models/PlayerDesignAttempt2.glb" data-category="characters">
                            <div class="card-thumb">
                                <img src="/thumbnails/KnightModelPreview.png" alt="Player Design">
                                <div class="card-overlay">
                                    <span class="view-label">PREVIEW</span>
                                </div>
                            </div>
                            <div class="card-info">
                                <p class="card-title">Player Design</p>
                                <p class="card-sub">Character</p>
                            </div>
                            <a class="card-download-btn" href="/models/PlayerDesignAttempt2.glb" download="PlayerDesign.glb" title="Download model" onclick="event.stopPropagation()">
                                <i class="fa-solid fa-download"></i>
                            </a>
                            <div class="card-accent"></div>
                        </div>

                        <div class="model-selection-card" data-model-src="/models/Sword.glb" data-model-download="/models/Sword.glb" data-category="props">
                            <div class="card-thumb">
                                <img src="/thumbnails/Render.png" alt="Sword">
                                <div class="card-overlay">
                                    <span class="view-label">PREVIEW</span>
                                </div>
                            </div>
                            <div class="card-info">
                                <p class="card-title">Sword</p>
                                <p class="card-sub">Prop</p>
                            </div>
                            <a class="card-download-btn" href="/models/Sword.glb" download="Sword.glb" title="Download model" onclick="event.stopPropagation()">
                                <i class="fa-solid fa-download"></i>
                            </a>
                            <div class="card-accent"></div>
                        </div>

                        <div class="model-selection-card placeholder-card" data-category="none">
                            <div class="card-thumb">
                                <div class="thumb-placeholder">
                                    <i class="fa-solid fa-cube"></i>
                                </div>
                            </div>
                            <div class="card-info">
                                <p class="card-title">Model 3</p>
                                <p class="card-sub">No source</p>
                            </div>
                            <div class="card-accent"></div>
                        </div>

                        <div class="model-selection-card placeholder-card" data-category="none">
                            <div class="card-thumb">
                                <div class="thumb-placeholder">
                                    <i class="fa-solid fa-cube"></i>
                                </div>
                            </div>
                            <div class="card-info">
                                <p class="card-title">Model 4</p>
                                <p class="card-sub">No source</p>
                            </div>
                            <div class="card-accent"></div>
                        </div>

                    </div>

                    <div id="menu-footer">
                        <div id="footer-divider"></div>
                        <span id="footer-count"><span id="asset-count">4</span> ASSETS</span>
                        <div id="footer-divider"></div>
                    </div>
                </div>
            </aside>

            <div id="content-right">
                <div id="viewer-hud">
                    <div id="hud-left">
                        <div id="active-model-name">- SELECT A MODEL -</div>
                        <div id="active-model-meta">No asset loaded</div>
                    </div>
                </div>

                <div id="empty-state">
                    <div id="empty-icon">
                        <i class="fa-solid fa-cubes"></i>
                    </div>
                    <p id="empty-title">No Model Selected</p>
                    <p id="empty-sub">Choose an asset from the library to begin</p>
                </div>

                <model-viewer id="model-preview"
                    src="" autoplay
                    ar camera-controls touch-action="pan-y"
                    shadow-intensity="1"
                    exposure="1"></model-viewer>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
